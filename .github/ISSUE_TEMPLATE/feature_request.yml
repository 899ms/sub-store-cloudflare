name: Feature request
description: Suggest a product-scope improvement
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        This project keeps a small Cloudflare-native scope. Please read `docs/product-scope.md` before proposing features copied from upstream Sub-Store.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow is blocked or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps the Workers + D1 + Worker Secrets architecture.
          required: true
        - label: This supports sources, collections, filters, templates, preview, backup/restore, or download workflows.
          required: true
