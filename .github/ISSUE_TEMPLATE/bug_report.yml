name: Bug report
description: Report a reproducible problem in Sub-Store Cloudflare
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove subscription URLs, node URIs, tokens, and private hostnames before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Deploy with ...
        2. Add a source ...
        3. Open ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: install-path
    attributes:
      label: Install path
      options:
        - Deploy to Cloudflare button
        - pnpm run install:cloudflare
        - Manual Wrangler deploy
        - Local development
        - Other
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Output target
      placeholder: mihomo, sing-box, surge, uri, json, etc.
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste relevant sanitized logs, command output, or screenshots.
      render: text
